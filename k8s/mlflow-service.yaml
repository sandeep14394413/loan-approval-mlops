# =============================================================================
# MLflow Tracking UI - Kubernetes Service
# =============================================================================
# NodePort 30501 exposes MLflow on the Kind node.
# Use kubectl port-forward for local browser access:
#   kubectl port-forward service/mlflow-service 5001:5001
#   open http://localhost:5001
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: mlflow-service
  labels:
    app: mlflow
spec:
  selector:
    app: mlflow
  ports:
    - name: mlflow-ui
      protocol: TCP
      port: 5001
      targetPort: 5001
      nodePort: 30501
  type: NodePort
