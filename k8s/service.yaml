# =============================================================================
# Flask Prediction API - Kubernetes Service
# =============================================================================
# NodePort 30500 exposes the Flask API on the Kind node.
# Use kubectl port-forward for local browser/curl access:
#   kubectl port-forward service/loan-approval-service 5000:5000
#   curl http://localhost:5000/health
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: loan-approval-service
  labels:
    app: loan-approval
spec:
  selector:
    app: loan-approval
  ports:
    - name: http
      protocol: TCP
      port: 5000
      targetPort: 5000
      nodePort: 30500
  type: NodePort
