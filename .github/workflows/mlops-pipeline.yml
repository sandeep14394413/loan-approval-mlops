# =============================================================================
# ML PIPELINE — Full Automation Workflow
# =============================================================================
# Triggers automatically whenever any file inside data/raw/ is added or changed.
#
# Pipeline Stages:
#   1. data-validation   — check CSV schema, nulls, row count
#   2. data-cleaning     — clean, encode, save processed dataset
#   3. model-training    — train Decision Tree, Random Forest, SVM
#   4. performance-gate  — compare models, fail if F1 < threshold
#   5. docker-build      — build & push image to GitHub Container Registry
#   6. kind-deploy       — spin up Kind cluster, deploy best model, smoke test
#   7. notify            — post pipeline summary as a GitHub commit comment
# =============================================================================

name: MLOps — Full Automation Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "data/raw/**"         # trigger only when new data is added
  workflow_dispatch:           # allow manual trigger from GitHub UI

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/loan-approval-mlops
  IMAGE_TAG: ${{ github.sha }}
  F1_THRESHOLD: "0.70"         # minimum F1 score to allow deployment

jobs:

# =============================================================================
# STAGE 1 — DATA VALIDATION
# =============================================================================
  data-validation:
    name: "Stage 1 — Data Validation"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data validation
        run: python -m src.pipeline.validate_data

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: reports/validation_report.json
          retention-days: 7

# =============================================================================
# STAGE 2 — DATA CLEANING
# =============================================================================
  data-cleaning:
    name: "Stage 2 — Data Cleaning"
    runs-on: ubuntu-latest
    needs: data-validation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data cleaning
        run: python -m src.pipeline.clean_data

      - name: Upload processed data
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: data/processed/
          retention-days: 7

# =============================================================================
# STAGE 3 — MODEL TRAINING
# =============================================================================
  model-training:
    name: "Stage 3 — Model Training"
    runs-on: ubuntu-latest
    needs: data-cleaning

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: data/processed/

      - name: Train all models
        run: python -m src.pipeline.train_pipeline

      - name: Upload trained models
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: models/
          retention-days: 14

      - name: Upload training metrics
        uses: actions/upload-artifact@v4
        with:
          name: training-metrics
          path: reports/metrics.json
          retention-days: 14

# =============================================================================
# STAGE 4 — PERFORMANCE GATE
# =============================================================================
  performance-gate:
    name: "Stage 4 — Performance Gate"
    runs-on: ubuntu-latest
    needs: model-training

    outputs:
      best_model: ${{ steps.gate.outputs.best_model }}
      best_f1: ${{ steps.gate.outputs.best_f1 }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download training metrics
        uses: actions/download-artifact@v4
        with:
          name: training-metrics
          path: reports/

      - name: Run performance gate check
        id: gate
        run: python -m src.pipeline.performance_gate
        env:
          F1_THRESHOLD: ${{ env.F1_THRESHOLD }}

# =============================================================================
# STAGE 5 — DOCKER BUILD & PUSH
# =============================================================================
  docker-build:
    name: "Stage 5 — Docker Build & Push"
    runs-on: ubuntu-latest
    needs: performance-gate

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download trained models
        uses: actions/download-artifact@v4
        with:
          name: trained-models
          path: models/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Output image info
        run: |
          echo "Image pushed: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"

# =============================================================================
# STAGE 6 — KIND CLUSTER DEPLOY + SMOKE TEST
# =============================================================================
  kind-deploy:
    name: "Stage 6 — Kind Deploy & Smoke Test"
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download trained models
        uses: actions/download-artifact@v4
        with:
          name: trained-models
          path: models/

      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl
          kubectl version --client

      - name: Create Kind cluster
        run: |
          kind create cluster --name loan-cluster --config k8s/kind-config.yaml --wait 60s
          kubectl cluster-info --context kind-loan-cluster

      - name: Build Docker image locally for Kind
        run: |
          docker build -t loan-approval-mlops:latest .

      - name: Load image into Kind
        run: |
          kind load docker-image loan-approval-mlops:latest --name loan-cluster

      - name: Deploy to Kind
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for deployment rollout
        run: |
          kubectl rollout status deployment/loan-approval-deployment --timeout=120s

      - name: Run smoke test
        run: |
          kubectl port-forward service/loan-approval-service 5000:5000 &
          sleep 5
          echo "Testing /health endpoint..."
          curl -sf http://localhost:5000/health | grep '"status": "ok"'
          echo "Health check passed!"

          echo "Testing /predict endpoint with sample payload..."
          curl -sf -X POST http://localhost:5000/predict \
            -H "Content-Type: application/json" \
            -d '{
              "Gender": "Male",
              "Married": "Yes",
              "Dependents": "0",
              "Education": "Graduate",
              "Self_Employed": "No",
              "ApplicantIncome": 5000,
              "CoapplicantIncome": 1500,
              "LoanAmount": 150,
              "Loan_Amount_Term": 360,
              "Credit_History": 1,
              "Property_Area": "Urban"
            }' | python3 -c "import sys,json; d=json.load(sys.stdin); print(d); assert 'loan_approved' in d, 'Missing loan_approved key'"
          echo "Predict smoke test passed!"

      - name: Show pod logs on failure
        if: failure()
        run: |
          kubectl get pods
          kubectl describe pods
          kubectl logs -l app=loan-approval --tail=50 || true

      - name: Delete Kind cluster
        if: always()
        run: kind delete cluster --name loan-cluster

# =============================================================================
# STAGE 7 — PIPELINE SUMMARY NOTIFICATION
# =============================================================================
  notify:
    name: "Stage 7 — Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [data-validation, data-cleaning, model-training, performance-gate, docker-build, kind-deploy]
    if: always()

    steps:
      - name: Download training metrics
        uses: actions/download-artifact@v4
        with:
          name: training-metrics
          path: reports/
        continue-on-error: true

      - name: Post pipeline summary
        run: |
          echo "## MLOps Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Data Validation | ${{ needs.data-validation.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Data Cleaning | ${{ needs.data-cleaning.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Model Training | ${{ needs.model-training.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Gate | ${{ needs.performance-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build | ${{ needs.docker-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Kind Deploy | ${{ needs.kind-deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Best Model:** ${{ needs.performance-gate.outputs.best_model }}" >> $GITHUB_STEP_SUMMARY
          echo "**Best F1 Score:** ${{ needs.performance-gate.outputs.best_f1 }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/metrics.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Model Metrics" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat reports/metrics.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
