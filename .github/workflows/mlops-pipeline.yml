name: MLOps - Full Automation Pipeline

on:
  push:
    branches: [main]
    paths: ["data/raw/**"]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/loan-approval-mlops
  IMAGE_TAG: ${{ github.sha }}
  F1_THRESHOLD: "0.65"
  # MLflow tracks experiments in local mlruns directory (relative path)
  # This avoids permission issues and allows persisting to host machine
  MLFLOW_TRACKING_URI: "mlruns"

jobs:

# =============================================================================
# STAGE 1 - DATA VALIDATION
# =============================================================================
  data-validation:
    name: Stage 1 - Data Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - run: python -m src.pipeline.validate_data
      - uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: reports/validation_report.json
          retention-days: 7

# =============================================================================
# STAGE 2 - DATA CLEANING
# =============================================================================
  data-cleaning:
    name: Stage 2 - Data Cleaning
    runs-on: ubuntu-latest
    needs: data-validation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m src.pipeline.clean_data
      - uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: data/processed/
          retention-days: 7

# =============================================================================
# STAGE 3 - MODEL TRAINING + MLFLOW TRACKING
# =============================================================================
  model-training:
    name: Stage 3 - Model Training + MLflow
    runs-on: ubuntu-latest
    needs: data-cleaning
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: data/processed/

      - name: Train all models (MLflow tracking enabled)
        run: python -m src.pipeline.train_pipeline
        env:
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Upload trained models
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: models/
          retention-days: 14

      - name: Upload MLflow runs
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/
          retention-days: 30

      - name: Upload training metrics JSON
        uses: actions/upload-artifact@v4
        with:
          name: training-metrics
          path: reports/metrics.json
          retention-days: 14

      - name: Upload markdown report
        uses: actions/upload-artifact@v4
        with:
          name: model-report
          path: reports/model_metrics.md
          retention-days: 14

# =============================================================================
# STAGE 4 - PERFORMANCE GATE
# =============================================================================
  performance-gate:
    name: Stage 4 - Performance Gate
    runs-on: ubuntu-latest
    needs: model-training
    outputs:
      best_model: ${{ steps.gate.outputs.best_model }}
      best_f1: ${{ steps.gate.outputs.best_f1 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - name: Download training metrics
        uses: actions/download-artifact@v4
        with:
          name: training-metrics
          path: reports/
      - name: Run performance gate
        id: gate
        run: python -m src.pipeline.performance_gate
        env:
          F1_THRESHOLD: ${{ env.F1_THRESHOLD }}

# =============================================================================
# STAGE 5 - DOCKER BUILD & PUSH
# =============================================================================
  docker-build:
    name: Stage 5 - Docker Build and Push
    runs-on: ubuntu-latest
    needs: performance-gate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Download trained models
        uses: actions/download-artifact@v4
        with:
          name: trained-models
          path: models/
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# =============================================================================
# STAGE 6 - KIND DEPLOY + SMOKE TEST
# =============================================================================
  kind-deploy:
    name: Stage 6 - Kind Deploy and Smoke Test
    runs-on: self-hosted
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Download trained models
        uses: actions/download-artifact@v4
        with:
          name: trained-models
          path: models/

      - name: Download MLflow runs
        uses: actions/download-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/

      - name: Check if kubectl is available
        run: kubectl version --client || echo "kubectl not found, attempting to use existing installation"
        shell: pwsh

      - name: Verify Kind cluster is running
        run: |
          $clusters = kubectl get nodes -o jsonpath='{.items[*].metadata.name}' 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Error: Kind cluster is not accessible. Please ensure the cluster is running."
            exit 1
          }
          Write-Host "✓ Existing Kind cluster found with nodes: $clusters"
        shell: pwsh

      - name: Build Docker image
        run: docker build -t loan-approval-mlops:latest .
        shell: pwsh

      - name: Load image into Kind cluster
        run: |
          $clusterName = kubectl config current-context
          Write-Host "Loading image into Kind cluster: $clusterName"
          kind load docker-image loan-approval-mlops:latest --name $clusterName
        shell: pwsh

      - name: Setup MLflow persistent storage
        run: |
          # Create a persistent volume for MLflow runs
          # This allows MLflow data to persist across restarts
          $mlflowDir = "C:\mlruns"
          if (!(Test-Path $mlflowDir)) {
            New-Item -ItemType Directory -Path $mlflowDir -Force
          }
          Copy-Item -Path "mlruns\*" -Destination $mlflowDir -Recurse -Force
          Write-Host "✓ MLflow runs copied to $mlflowDir"
        shell: pwsh

      - name: Deploy Flask API
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          Start-Sleep -Seconds 10
          kubectl rollout status deployment/loan-approval-deployment --timeout=120s
        shell: pwsh

      - name: Deploy MLflow UI
        run: |
          kubectl apply -f k8s/mlflow-deployment.yaml
          kubectl apply -f k8s/mlflow-service.yaml
          Start-Sleep -Seconds 10
          kubectl rollout status deployment/mlflow-deployment --timeout=120s
        shell: pwsh

      - name: Print service URLs
        run: |
          Write-Host "================================================" -ForegroundColor Cyan
          Write-Host "  Flask API   : http://localhost:5000" -ForegroundColor Green
          Write-Host "  Flask health: http://localhost:5000/health" -ForegroundColor Green
          Write-Host "  Flask predict: http://localhost:5000/predict" -ForegroundColor Green
          Write-Host "  MLflow UI   : http://localhost:5001" -ForegroundColor Green
          Write-Host "================================================" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "MLflow will continue running on the cluster after deployment." -ForegroundColor Yellow
          Write-Host "Access MLflow UI at: http://localhost:5001" -ForegroundColor Yellow
        shell: pwsh

      - name: Smoke test - Flask health endpoint
        run: |
          # Start port-forward in background
          $portForwardJob = Start-Process -NoNewWindow -PassThru -ArgumentList "port-forward service/loan-approval-service 5000:5000" -FilePath "kubectl"
          Start-Sleep -Seconds 8
          Write-Host "Testing /health ..."
          $response = Invoke-WebRequest -Uri "http://localhost:5000/health" -ErrorAction Stop
          Write-Host "✓ Flask health OK (Status: $($response.StatusCode))"
        shell: pwsh

      - name: Smoke test - Flask predict endpoint
        run: |
          $payload = @{
            Annual_Income = 1200000
            Applicant_Age = 35
            Work_Experience = 8
            Years_in_Current_Employment = 3
            Years_in_Current_Residence = 5
            Marital_Status = "married"
            House_Ownership = "owned"
            "Vehicle_Ownership(car)" = "yes"
            Occupation = "Software_Developer"
            Residence_City = "Bangalore"
            Residence_State = "Karnataka"
          } | ConvertTo-Json
          Write-Host "Testing /predict ..."
          $response = Invoke-WebRequest -Uri "http://localhost:5000/predict" -Method POST -Body $payload -ContentType "application/json" -ErrorAction Stop
          Write-Host "✓ Flask predict OK (Status: $($response.StatusCode))"
          Write-Host "Response: $($response.Content)"
        shell: pwsh

      - name: Smoke test - MLflow UI
        run: |
          # Start port-forward in background
          $portForwardJob = Start-Process -NoNewWindow -PassThru -ArgumentList "port-forward service/mlflow-service 5001:5001" -FilePath "kubectl"
          Start-Sleep -Seconds 8
          Write-Host "Testing MLflow UI ..."
          try {
            $response = Invoke-WebRequest -Uri "http://localhost:5001" -ErrorAction Stop
            Write-Host "✓ MLflow UI OK (Status: $($response.StatusCode))"
          } catch {
            Write-Host "Warning: MLflow UI check failed, but continuing..."
          }
          Write-Host "✓ MLflow UI is accessible at http://localhost:5001"
          Write-Host "MLflow experiments available for monitoring run performance"
        shell: pwsh

      - name: Debug logs on failure
        if: failure()
        run: |
          Write-Host "=== Pods ===" -ForegroundColor Yellow
          kubectl get pods -o wide
          Write-Host "=== Flask logs ===" -ForegroundColor Yellow
          kubectl logs -l app=loan-approval --tail=80 -ErrorAction SilentlyContinue
          Write-Host "=== MLflow logs ===" -ForegroundColor Yellow
          kubectl logs -l app=mlflow --tail=80 -ErrorAction SilentlyContinue
          Write-Host "=== Describe pods ===" -ForegroundColor Yellow
          kubectl describe pods
        shell: pwsh

      - name: Keep cluster running
        if: success()
        run: |
          Write-Host "✓ Deployment successful!" -ForegroundColor Green
          Write-Host "Kind cluster remains active for monitoring." -ForegroundColor Cyan
          Write-Host "" 
          Write-Host "To access services locally:" -ForegroundColor Cyan
          Write-Host "  kubectl port-forward service/loan-approval-service 5000:5000" -ForegroundColor Gray
          Write-Host "  kubectl port-forward service/mlflow-service 5001:5001" -ForegroundColor Gray
          Write-Host ""
          Write-Host "Then visit:" -ForegroundColor Cyan
          Write-Host "  Flask API: http://localhost:5000" -ForegroundColor Gray
          Write-Host "  MLflow UI: http://localhost:5001" -ForegroundColor Gray
        shell: pwsh

# =============================================================================
# STAGE 7 - PIPELINE SUMMARY
# =============================================================================
  notify:
    name: Stage 7 - Pipeline Summary
    runs-on: ubuntu-latest
    needs: [data-validation, data-cleaning, model-training, performance-gate, docker-build, kind-deploy]
    if: always()
    steps:
      - name: Download training metrics
        uses: actions/download-artifact@v4
        with:
          name: training-metrics
          path: reports/
        continue-on-error: true
      - name: Post summary
        run: |
          echo "## MLOps Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Data Validation  | ${{ needs.data-validation.result }}  |" >> $GITHUB_STEP_SUMMARY
          echo "| Data Cleaning    | ${{ needs.data-cleaning.result }}    |" >> $GITHUB_STEP_SUMMARY
          echo "| Model Training   | ${{ needs.model-training.result }}   |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Gate | ${{ needs.performance-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build     | ${{ needs.docker-build.result }}     |" >> $GITHUB_STEP_SUMMARY
          echo "| Kind Deploy      | ${{ needs.kind-deploy.result }}      |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Best Model:** ${{ needs.performance-gate.outputs.best_model }}" >> $GITHUB_STEP_SUMMARY
          echo "**Best F1:** ${{ needs.performance-gate.outputs.best_f1 }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Service URLs (when cluster is running locally)" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Flask Predict API | http://localhost:5000 |" >> $GITHUB_STEP_SUMMARY
          echo "| MLflow UI         | http://localhost:5001 |" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/metrics.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Full Model Metrics" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat reports/metrics.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
