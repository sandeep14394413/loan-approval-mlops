# =============================================================================
# ML PIPELINE — Full Automation Workflow
# =============================================================================
# Triggers automatically whenever any file inside data/raw/ is pushed.
#
# Stages:
#   1. data-validation   — schema, nulls, row count, target values
#   2. data-cleaning     — dedupe, strip, encode, save processed CSV
#   3. model-training    — Decision Tree + Random Forest + SVM + 5-fold CV
#   4. performance-gate  — blocks deploy if best F1 < threshold
#   5. docker-build      — build & push to GitHub Container Registry
#   6. kind-deploy       — Kind cluster, load image, deploy, smoke test
#   7. notify            — pipeline summary posted to Actions summary page
# =============================================================================

name: MLOps — Full Automation Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "data/raw/**"
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/loan-approval-mlops
  IMAGE_TAG: ${{ github.sha }}
  F1_THRESHOLD: "0.70"

jobs:

# =============================================================================
# STAGE 1 — DATA VALIDATION
# =============================================================================
  data-validation:
    name: "Stage 1 — Data Validation"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Run data validation
        run: python -m src.pipeline.validate_data

      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: reports/validation_report.json
          retention-days: 7

# =============================================================================
# STAGE 2 — DATA CLEANING
# =============================================================================
  data-cleaning:
    name: "Stage 2 — Data Cleaning"
    runs-on: ubuntu-latest
    needs: data-validation
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run data cleaning
        run: python -m src.pipeline.clean_data

      - name: Upload processed data
        uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: data/processed/
          retention-days: 7

# =============================================================================
# STAGE 3 — MODEL TRAINING
# =============================================================================
  model-training:
    name: "Stage 3 — Model Training"
    runs-on: ubuntu-latest
    needs: data-cleaning
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: data/processed/

      - name: Train all models
        run: python -m src.pipeline.train_pipeline

      - name: Upload trained models
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: models/
          retention-days: 14

      - name: Upload training metrics
        uses: actions/upload-artifact@v4
        with:
          name: training-metrics
          path: reports/metrics.json
          retention-days: 14

# =============================================================================
# STAGE 4 — PERFORMANCE GATE
# =============================================================================
  performance-gate:
    name: "Stage 4 — Performance Gate"
    runs-on: ubuntu-latest
    needs: model-training
    outputs:
      best_model: ${{ steps.gate.outputs.best_model }}
      best_f1: ${{ steps.gate.outputs.best_f1 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download training metrics
        uses: actions/download-artifact@v4
        with:
          name: training-metrics
          path: reports/

      - name: Run performance gate
        id: gate
        run: python -m src.pipeline.performance_gate
        env:
          F1_THRESHOLD: ${{ env.F1_THRESHOLD }}

# =============================================================================
# STAGE 5 — DOCKER BUILD & PUSH
# =============================================================================
  docker-build:
    name: "Stage 5 — Docker Build & Push"
    runs-on: ubuntu-latest
    needs: performance-gate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download trained models
        uses: actions/download-artifact@v4
        with:
          name: trained-models
          path: models/

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# =============================================================================
# STAGE 6 — KIND DEPLOY + SMOKE TEST
# =============================================================================
  kind-deploy:
    name: "Stage 6 — Kind Deploy & Smoke Test"
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Download trained models
        uses: actions/download-artifact@v4
        with:
          name: trained-models
          path: models/

      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.24.0/kind-linux-amd64
          chmod +x ./kind && sudo mv ./kind /usr/local/bin/kind

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/kubectl

      - name: Create Kind cluster
        run: kind create cluster --name loan-cluster --config k8s/kind-config.yaml --wait 60s

      - name: Build Docker image for Kind
        run: docker build -t loan-approval-mlops:latest .

      - name: Load image into Kind
        run: kind load docker-image loan-approval-mlops:latest --name loan-cluster

      - name: Deploy to Kind
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/loan-approval-deployment --timeout=120s

      - name: Smoke test — health + predict
        run: |
          kubectl port-forward service/loan-approval-service 5000:5000 &
          sleep 6

          echo "--- /health ---"
          curl -sf http://localhost:5000/health

          echo "--- /predict ---"
          curl -sf -X POST http://localhost:5000/predict \
            -H "Content-Type: application/json" \
            -d '{
              "Annual_Income": 1200000,
              "Applicant_Age": 35,
              "Work_Experience": 8,
              "Years_in_Current_Employment": 3,
              "Years_in_Current_Residence": 5,
              "Marital_Status": "married",
              "House_Ownership": "owned",
              "Vehicle_Ownership(car)": "yes",
              "Occupation": "Software_Developer",
              "Residence_City": "Bangalore",
              "Residence_State": "Karnataka"
            }' | python3 -c "
import sys, json
d = json.load(sys.stdin)
print(d)
assert 'loan_safe' in d, 'Missing loan_safe in response'
print('Smoke test PASSED')
"

      - name: Debug logs on failure
        if: failure()
        run: |
          kubectl get pods -o wide
          kubectl describe pods
          kubectl logs -l app=loan-approval --tail=80 || true

      - name: Delete Kind cluster
        if: always()
        run: kind delete cluster --name loan-cluster

# =============================================================================
# STAGE 7 — PIPELINE SUMMARY
# =============================================================================
  notify:
    name: "Stage 7 — Pipeline Summary"
    runs-on: ubuntu-latest
    needs: [data-validation, data-cleaning, model-training, performance-gate, docker-build, kind-deploy]
    if: always()
    steps:
      - name: Download training metrics
        uses: actions/download-artifact@v4
        with:
          name: training-metrics
          path: reports/
        continue-on-error: true

      - name: Post summary
        run: |
          echo "## MLOps Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Data Validation  | ${{ needs.data-validation.result }}  |" >> $GITHUB_STEP_SUMMARY
          echo "| Data Cleaning    | ${{ needs.data-cleaning.result }}    |" >> $GITHUB_STEP_SUMMARY
          echo "| Model Training   | ${{ needs.model-training.result }}   |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Gate | ${{ needs.performance-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build     | ${{ needs.docker-build.result }}     |" >> $GITHUB_STEP_SUMMARY
          echo "| Kind Deploy      | ${{ needs.kind-deploy.result }}      |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Best Model:** ${{ needs.performance-gate.outputs.best_model }}" >> $GITHUB_STEP_SUMMARY
          echo "**Best F1:** ${{ needs.performance-gate.outputs.best_f1 }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/metrics.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Full Model Metrics" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat reports/metrics.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
