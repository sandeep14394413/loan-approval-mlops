name: MLOps - Full Automation Pipeline

on:
  push:
    branches: [main]
    paths: ["data/raw/**"]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/loan-approval-mlops
  IMAGE_TAG: ${{ github.sha }}
  F1_THRESHOLD: "0.65"
  BUILD_ID: ${{ github.run_id }}
  KIND_CLUSTER_NAME: prod-cluster
  # MLflow tracks experiments in local mlruns directory (relative path)
  # This avoids permission issues and allows persisting to host machine
  MLFLOW_TRACKING_URI: "mlruns"

jobs:

# =============================================================================
# STAGE 1 - DATA VALIDATION
# =============================================================================
  data-validation:
    name: Stage 1 - Data Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install --upgrade pip && pip install -r requirements.txt
      - run: python -m src.pipeline.validate_data
      - uses: actions/upload-artifact@v4
        with:
          name: validation-report
          path: reports/validation_report.json
          retention-days: 7

# =============================================================================
# STAGE 2 - DATA CLEANING
# =============================================================================
  data-cleaning:
    name: Stage 2 - Data Cleaning
    runs-on: ubuntu-latest
    needs: data-validation
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - run: python -m src.pipeline.clean_data
      - uses: actions/upload-artifact@v4
        with:
          name: processed-data
          path: data/processed/
          retention-days: 7

# =============================================================================
# STAGE 3 - MODEL TRAINING + MLFLOW TRACKING
# =============================================================================
  model-training:
    name: Stage 3 - Model Training + MLflow
    runs-on: ubuntu-latest
    needs: data-cleaning
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt

      - name: Download processed data
        uses: actions/download-artifact@v4
        with:
          name: processed-data
          path: data/processed/

      - name: Train all models (MLflow tracking enabled)
        run: python -m src.pipeline.train_pipeline
        env:
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}
          BUILD_ID: ${{ env.BUILD_ID }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
          GITHUB_SHA: ${{ github.sha }}

      - name: Upload trained models
        uses: actions/upload-artifact@v4
        with:
          name: trained-models
          path: models/
          retention-days: 14

      - name: Upload MLflow runs
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/
          retention-days: 30

      - name: Upload training metrics JSON
        uses: actions/upload-artifact@v4
        with:
          name: training-metrics
          path: reports/metrics.json
          retention-days: 14

      - name: Upload markdown report
        uses: actions/upload-artifact@v4
        with:
          name: model-report
          path: reports/model_metrics.md
          retention-days: 14

# =============================================================================
# STAGE 4 - PERFORMANCE GATE
# =============================================================================
  performance-gate:
    name: Stage 4 - Performance Gate
    runs-on: ubuntu-latest
    needs: model-training
    outputs:
      best_model: ${{ steps.gate.outputs.best_model }}
      best_f1: ${{ steps.gate.outputs.best_f1 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -r requirements.txt
      - name: Download training metrics
        uses: actions/download-artifact@v4
        with:
          name: training-metrics
          path: reports/
      - name: Run performance gate
        id: gate
        run: python -m src.pipeline.performance_gate
        env:
          F1_THRESHOLD: ${{ env.F1_THRESHOLD }}

# =============================================================================
# STAGE 5 - DOCKER BUILD & PUSH
# =============================================================================
  docker-build:
    name: Stage 5 - Docker Build and Push
    runs-on: ubuntu-latest
    needs: performance-gate
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Download trained models
        uses: actions/download-artifact@v4
        with:
          name: trained-models
          path: models/
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

# =============================================================================
# STAGE 6 - KIND DEPLOY + SMOKE TEST
# =============================================================================
  kind-deploy:
    name: Stage 6 - Kind Deploy and Smoke Test
    runs-on: self-hosted
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Download trained models
        uses: actions/download-artifact@v4
        with:
          name: trained-models
          path: models/

      - name: Download MLflow runs
        uses: actions/download-artifact@v4
        with:
          name: mlflow-runs
          path: mlruns/

      - name: Check if kubectl is available
        run: kubectl version --client || echo "kubectl not found, attempting to use existing installation"
        shell: pwsh

      - name: Verify Kind cluster is running
        run: |
          $clusterName = "${{ env.KIND_CLUSTER_NAME }}"
          $clusters = kind get clusters
          if ($clusters -notcontains $clusterName) {
            Write-Host "Kind cluster '$clusterName' not found. Creating it..."
            kind create cluster --name $clusterName --config k8s/kind-config.yaml
          }
          kubectl config use-context "kind-$clusterName"
          $nodes = kubectl get nodes -o jsonpath='{.items[*].metadata.name}'
          Write-Host "✓ Kind cluster '$clusterName' is ready with nodes: $nodes"
        shell: pwsh

      - name: Build Docker image
        run: docker build -t loan-approval-mlops:latest .
        shell: pwsh

      - name: Load image into Kind cluster
        run: |
          Write-Host "Available Kind clusters:"
          kind get clusters
          Write-Host "Loading image into ${{ env.KIND_CLUSTER_NAME }}..."
          kind load docker-image loan-approval-mlops:latest --name ${{ env.KIND_CLUSTER_NAME }}
        shell: pwsh

      - name: Setup MLflow persistent storage
        run: |
          $clusterName = "${{ env.KIND_CLUSTER_NAME }}"
          $nodeNames = kind get nodes --name $clusterName

          if (!(Test-Path "mlruns")) {
            Write-Host "Error: mlruns artifact directory was not downloaded."
            exit 1
          }

          foreach ($nodeName in $nodeNames) {
            docker exec $nodeName sh -c "rm -rf /mlruns && mkdir -p /mlruns/.trash"
            docker cp "mlruns/." "${nodeName}:/mlruns"
            docker exec $nodeName sh -c "mkdir -p /mlruns/.trash"
            Write-Host "✓ MLflow runs for build ${{ env.BUILD_ID }} copied into Kind node $nodeName:/mlruns"
          }
        shell: pwsh

      - name: Deploy Flask API
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml
          kubectl set env deployment/loan-approval-deployment BUILD_ID=${{ env.BUILD_ID }} GIT_SHA=${{ github.sha }}
          kubectl annotate deployment/loan-approval-deployment ci.github.com/build-id=${{ env.BUILD_ID }} ci.github.com/git-sha=${{ github.sha }} --overwrite
          Start-Sleep -Seconds 15
          Write-Host "Checking deployment status..."
          kubectl get pods -o wide
          kubectl rollout status deployment/loan-approval-deployment --timeout=180s 2>$null || {
            Write-Host "Rollout failed - checking pod details..."
            kubectl describe pod -l app=loan-approval
            kubectl logs -l app=loan-approval --all-containers=true --tail=50
            exit 1
          }
        shell: pwsh

      - name: Deploy MLflow UI
        run: |
          kubectl apply -f k8s/mlflow-deployment.yaml
          kubectl apply -f k8s/mlflow-service.yaml
          kubectl set env deployment/mlflow-deployment BUILD_ID=${{ env.BUILD_ID }} GIT_SHA=${{ github.sha }}
          kubectl annotate deployment/mlflow-deployment ci.github.com/build-id=${{ env.BUILD_ID }} ci.github.com/git-sha=${{ github.sha }} --overwrite
          Start-Sleep -Seconds 15
          Write-Host "Checking MLflow deployment status..."
          kubectl get pods -o wide
          kubectl rollout status deployment/mlflow-deployment --timeout=180s || {
            Write-Host "MLflow rollout failed - checking pod details..."
            kubectl describe pod -l app=mlflow
            kubectl logs -l app=mlflow --all-containers=true --tail=50
            exit 1
          }
        shell: pwsh

      - name: Print service URLs
        run: |
          Write-Host "================================================" -ForegroundColor Cyan
          Write-Host "  Flask API   : http://localhost:5000" -ForegroundColor Green
          Write-Host "  Flask health: http://localhost:5000/health" -ForegroundColor Green
          Write-Host "  Flask predict: http://localhost:5000/predict" -ForegroundColor Green
          Write-Host "  MLflow UI   : http://localhost:5001" -ForegroundColor Green
          Write-Host "  Build ID    : ${{ env.BUILD_ID }}" -ForegroundColor Green
          Write-Host "================================================" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "MLflow will continue running on the cluster after deployment." -ForegroundColor Yellow
          Write-Host "Access MLflow UI at: http://localhost:5001" -ForegroundColor Yellow
        shell: pwsh

      - name: Smoke test - Flask and MLflow endpoints
        run: |
          function Get-FreePort {
            param([int]$StartPort = 5000, [int]$EndPort = 5100)
            for ($port = $StartPort; $port -le $EndPort; $port++) {
              $listener = [System.Net.Sockets.TcpListener]::new([System.Net.IPAddress]::Loopback, $port)
              try {
                $listener.Start()
                return $port
              } catch {
                continue
              } finally {
                $listener.Stop()
              }
            }
            throw "No free local port found between $StartPort and $EndPort"
          }

          $flaskLocalPort = Get-FreePort -StartPort 5000 -EndPort 5099
          $mlflowLocalPort = Get-FreePort -StartPort 5100 -EndPort 5199

          $flaskForward = Start-Process -FilePath "kubectl" -ArgumentList "port-forward service/loan-approval-service $flaskLocalPort:5000 --address 127.0.0.1" -PassThru -WindowStyle Hidden
          $mlflowForward = Start-Process -FilePath "kubectl" -ArgumentList "port-forward service/mlflow-service $mlflowLocalPort:5001 --address 127.0.0.1" -PassThru -WindowStyle Hidden

          Start-Sleep -Seconds 8
          Write-Host "Started Flask port-forward (PID: $($flaskForward.Id)) on localhost:$flaskLocalPort"
          Write-Host "Started MLflow port-forward (PID: $($mlflowForward.Id)) on localhost:$mlflowLocalPort"

          try {
            $maxRetries = 8
            $retryCount = 0
            $healthUrl = "http://127.0.0.1:$flaskLocalPort/health"

            while ($retryCount -lt $maxRetries) {
              try {
                Write-Host "Testing /health (attempt $($retryCount + 1)/$maxRetries)..."
                $response = Invoke-WebRequest -Uri $healthUrl -TimeoutSec 5
                Write-Host "✓ Flask health OK (Status: $($response.StatusCode))" -ForegroundColor Green
                break
              } catch {
                $retryCount++
                if ($retryCount -lt $maxRetries) {
                  Write-Host "Retrying in 3 seconds..."
                  Start-Sleep -Seconds 3
                } else {
                  Write-Host "Health check failed after $maxRetries attempts" -ForegroundColor Red
                  exit 1
                }
              }
            }

            $payload = @{
              Annual_Income = 1200000
              Applicant_Age = 35
              Work_Experience = 8
              Years_in_Current_Employment = 3
              Years_in_Current_Residence = 5
              Marital_Status = "married"
              House_Ownership = "owned"
              "Vehicle_Ownership(car)" = "yes"
              Occupation = "Software_Developer"
              Residence_City = "Bangalore"
              Residence_State = "Karnataka"
            } | ConvertTo-Json

            Write-Host "Testing /predict endpoint..."
            try {
              $response = Invoke-WebRequest -Uri "http://127.0.0.1:$flaskLocalPort/predict" -Method POST -Body $payload -ContentType "application/json" -TimeoutSec 10
              Write-Host "✓ Flask predict OK (Status: $($response.StatusCode))" -ForegroundColor Green
              Write-Host "Response: $($response.Content)"
            } catch {
              Write-Host "Predict endpoint failed: $_" -ForegroundColor Red
              exit 1
            }

            $mlflowRetries = 8
            $mlflowRetryCount = 0
            while ($mlflowRetryCount -lt $mlflowRetries) {
              try {
                Write-Host "Testing MLflow UI (attempt $($mlflowRetryCount + 1)/$mlflowRetries)..."
                $response = Invoke-WebRequest -Uri "http://127.0.0.1:$mlflowLocalPort" -TimeoutSec 5
                Write-Host "✓ MLflow UI OK (Status: $($response.StatusCode))" -ForegroundColor Green
                Write-Host "MLflow is accessible over localhost" -ForegroundColor Green
                break
              } catch {
                $mlflowRetryCount++
                if ($mlflowRetryCount -lt $mlflowRetries) {
                  Write-Host "Retrying in 3 seconds..."
                  Start-Sleep -Seconds 3
                } else {
                  Write-Host "MLflow UI check failed, but continuing deployment..." -ForegroundColor Yellow
                }
              }
            }
          } finally {
            if ($flaskForward) {
              Stop-Process -Id $flaskForward.Id -Force -ErrorAction SilentlyContinue
            }
            if ($mlflowForward) {
              Stop-Process -Id $mlflowForward.Id -Force -ErrorAction SilentlyContinue
            }
          }
        shell: pwsh

      - name: Debug logs on failure
        if: failure()
        run: |
          Write-Host "=== Pods ===" -ForegroundColor Yellow
          kubectl get pods -o wide 2>$null || Write-Host "Failed to get pods"
          Write-Host "=== Flask logs ===" -ForegroundColor Yellow
          kubectl logs -l app=loan-approval --tail=100 2>$null || Write-Host "No logs found for Flask"
          Write-Host "=== MLflow logs ===" -ForegroundColor Yellow
          kubectl logs -l app=mlflow --tail=100 2>$null || Write-Host "No logs found for MLflow"
          Write-Host "=== Describe pods ===" -ForegroundColor Yellow
          kubectl describe pods 2>$null || Write-Host "Failed to describe pods"
        shell: pwsh

      - name: Keep cluster running
        if: success()
        run: |
          Write-Host "✓ Deployment successful!" -ForegroundColor Green
          Write-Host "Kind cluster remains active for monitoring." -ForegroundColor Cyan
          Write-Host "" 
          Write-Host "To access services from your machine:" -ForegroundColor Cyan
          Write-Host "  kubectl port-forward service/loan-approval-service 5000:5000" -ForegroundColor Gray
          Write-Host "  kubectl port-forward service/mlflow-service 5001:5001" -ForegroundColor Gray
          Write-Host ""
          Write-Host "Then visit:" -ForegroundColor Cyan
          Write-Host "  Flask API: http://localhost:5000" -ForegroundColor Gray
          Write-Host "  Flask health: http://localhost:5000/health" -ForegroundColor Gray
          Write-Host "  Flask predict: http://localhost:5000/predict" -ForegroundColor Gray
          Write-Host "  MLflow UI: http://localhost:5001" -ForegroundColor Gray
          Write-Host ""
          Write-Host "All metrics are being tracked in MLflow for monitoring run performance." -ForegroundColor Cyan
        shell: pwsh

# =============================================================================
# STAGE 7 - PIPELINE SUMMARY
# =============================================================================
  notify:
    name: Stage 7 - Pipeline Summary
    runs-on: ubuntu-latest
    needs: [data-validation, data-cleaning, model-training, performance-gate, docker-build, kind-deploy]
    if: always()
    steps:
      - name: Download training metrics
        uses: actions/download-artifact@v4
        with:
          name: training-metrics
          path: reports/
        continue-on-error: true
      - name: Post summary
        run: |
          echo "## MLOps Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Data Validation  | ${{ needs.data-validation.result }}  |" >> $GITHUB_STEP_SUMMARY
          echo "| Data Cleaning    | ${{ needs.data-cleaning.result }}    |" >> $GITHUB_STEP_SUMMARY
          echo "| Model Training   | ${{ needs.model-training.result }}   |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Gate | ${{ needs.performance-gate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Build     | ${{ needs.docker-build.result }}     |" >> $GITHUB_STEP_SUMMARY
          echo "| Kind Deploy      | ${{ needs.kind-deploy.result }}      |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Best Model:** ${{ needs.performance-gate.outputs.best_model }}" >> $GITHUB_STEP_SUMMARY
          echo "**Best F1:** ${{ needs.performance-gate.outputs.best_f1 }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build ID:** ${{ env.BUILD_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Service URLs (when cluster is running locally)" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Flask Predict API | http://localhost:5000 |" >> $GITHUB_STEP_SUMMARY
          echo "| MLflow UI         | http://localhost:5001 |" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/metrics.json ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Full Model Metrics" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat reports/metrics.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
